[phases.setup]
nixPkgs = ['...', 'php84']

[phases.install]
cmds = [
    'mkdir -p storage/framework/{sessions,views,cache}',
    'mkdir -p storage/logs',
    'mkdir -p bootstrap/cache',
    'chmod -R 775 storage bootstrap/cache',
    'composer install --no-dev --optimize-autoloader --no-interaction',
    'npm ci',
    'npm run build',
]

[start]
cmd = 'php artisan config:cache && php artisan route:cache && php artisan view:cache && (php artisan migrate --force || echo "WARN: migration failed, continuing app startup") && (php artisan storage:link 2>/dev/null || true) && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
