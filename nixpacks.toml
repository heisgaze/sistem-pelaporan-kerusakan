[phases.setup]
nixPkgs = ['...', 'php84', 'php84Extensions.pdo', 'php84Extensions.pdo_mysql', 'php84Extensions.mbstring', 'php84Extensions.openssl', 'php84Extensions.tokenizer', 'php84Extensions.xml', 'php84Extensions.ctype', 'php84Extensions.fileinfo', 'php84Extensions.bcmath', 'php84Extensions.curl', 'php84Extensions.gd']

[phases.install]
cmds = [
    'mkdir -p storage/framework/{sessions,views,cache}',
    'mkdir -p storage/logs',
    'mkdir -p bootstrap/cache',
    'composer install --no-dev --optimize-autoloader --no-interaction',
    'npm ci',
    'npm run build',
]

[phases.build]
cmds = [
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]

[start]
cmd = 'php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
