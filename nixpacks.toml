[variables]
NIXPACKS_PHP_VERSION = "8.2"

[phases.setup]
nixPkgs = ['...', 'php82Extensions.pdo_mysql', 'php82Extensions.gd', 'php82Extensions.mbstring', 'php82Extensions.bcmath', 'php82Extensions.curl', 'php82Extensions.xml', 'php82Extensions.zip']

[phases.install]
cmds = [
    'mkdir -p storage/framework/{sessions,views,cache}',
    'mkdir -p storage/logs',
    'mkdir -p bootstrap/cache',
    'composer install --no-dev --optimize-autoloader --no-interaction',
    'npm ci',
    'npm run build',
]

[phases.build]
cmds = [
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]

[start]
cmd = 'php artisan migrate --force && php artisan storage:link 2>/dev/null; php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
